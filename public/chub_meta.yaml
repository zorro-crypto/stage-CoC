project_name: "CoC Investigator Keeper"
tagline: "Call of Cthulhu investigators, vitals, wounds, insanity, items, and clues."
visibility: "PRIVATE"
position: "ADJACENT"

tags:
  - "Stage"
  - "Call of Cthulhu"
  - "RPG"
  - "Keeper"

config_schema:
  type: object
  properties:
    sendStatusToPrompt:
      type: boolean
      default: true

state_schema:
  chat:
    type: object
    properties:
      investigators:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            hp:
              type: integer
            mp:
              type: integer
            san:
              type: integer
            luck:
              type: integer
            majorWound:
              type: boolean
            temporaryInsanity:
              type: string
            indefiniteInsanity:
              type: string
            inventory:
              type: string
            clues:
              type: string
